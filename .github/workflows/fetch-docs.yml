name: Fetch Rules from Google Docs

on:
  schedule:
   - cron: '0 * * * *'
  workflow_dispatch:
    # Allows you to trigger manually from the Actions tab

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Google Docs
        run: python3 fetch_docs.py

      - name: Commit updated rules (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/ search-index.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update rules from Google Docs"
            git push
          fi
